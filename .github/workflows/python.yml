name: Python

on:
  pull_request:
    paths:
      - "src/julee/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"
  push:
    branches: [master]
    paths:
      - "src/julee/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run make lint-python

  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Test
        run: uv run make test-python-unit

  doctrine:
    name: Doctrine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Doctrine tests
        run: PYTHONPATH=src uv run pytest src/julee/core/doctrine/
